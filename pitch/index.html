<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Euroff 7 × Everywhere — Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter+Tight:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#111;--paper:#F4F1EA;--c:#1B4DFF;--m:#FF2D55;--y:#FFC400;--teal:#00A88F}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter Tight',sans-serif;min-height:100vh;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;padding:24px}
.hub{width:100%;max-width:420px}
.cmyk{display:flex;height:7px;margin-bottom:22px}.cmyk i{flex:1}.cmyk .ic{background:var(--c)}.cmyk .im{background:var(--m)}.cmyk .iy{background:var(--y)}.cmyk .ik{background:#333}
.ev{font-family:'IBM Plex Mono';font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--y);margin-bottom:14px}
.mk{width:52px;height:52px;background:var(--paper);color:var(--ink);display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:22px;margin-bottom:14px}
h1{font-family:'Space Grotesk';font-weight:700;font-size:26px;letter-spacing:-.5px}
.tag{font-family:'IBM Plex Mono';font-size:11.5px;letter-spacing:1px;text-transform:uppercase;color:#9a958a;margin:4px 0 24px}
a.b{display:flex;align-items:center;gap:14px;text-align:left;background:#1b1b1b;border:1.5px solid #333;padding:16px 18px;margin-bottom:12px;color:#fff;text-decoration:none;transition:.15s}
a.b:active{transform:scale(.98)}
a.b .ic{font-size:20px;width:26px;text-align:center}
a.b .t{flex:1}
a.b .t .h{font-family:'Space Grotesk';font-weight:600;font-size:16px;display:block}
a.b .t .s{font-family:'IBM Plex Mono';font-size:11px;color:#9a958a;display:block;margin-top:3px}
a.b .ar{font-size:19px;color:var(--m)}
a.b.prim{background:var(--m);border-color:var(--m)}a.b.prim .t .s{color:#ffd9e1}a.b.prim .ar{color:#fff}
a.etude{display:flex;align-items:center;gap:14px;text-align:left;text-decoration:none;color:#fff;margin-top:6px;background:var(--teal);border:1.5px solid var(--teal);padding:16px 18px}
a.etude .ic{font-size:22px;width:26px;text-align:center}
a.etude .t{flex:1}
a.etude .t .l{font-family:'IBM Plex Mono';font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:#d5fff7;display:block}
a.etude .t .h{font-family:'Space Grotesk';font-weight:600;font-size:16px;display:block;margin-top:2px}
a.etude .t .s{font-family:'IBM Plex Mono';font-size:11px;color:#d5fff7;display:block;margin-top:2px}
a.etude .ar{font-size:19px;color:#fff}
.foot{margin-top:18px;font-family:'IBM Plex Mono';font-size:10.5px;color:#9a958a}
</style>
</head>
<body>
<div class="hub">
  <div class="cmyk"><i class="ic"></i><i class="im"></i><i class="iy"></i><i class="ik"></i></div>
  <div class="ev">Everywhere · Hub commercial</div>
  <div class="mk">E7</div>
  <h1>Euroff 7 Communication</h1>
  <div class="tag">Tout pour l'échange, en un écran</div>

  <a class="b prim" href="../" target="_blank" rel="noopener">
    <span class="ic">🖨️</span><span class="t"><span class="h">Voir la maquette</span><span class="s">Le mur des réalisations + le devis en ligne</span></span><span class="ar">→</span>
  </a>
  <a class="etude" href="../etude/?e=Euroff%207">
    <span class="ic">🧮</span><span class="t"><span class="l">En bonus · sous 48 h</span><span class="h">L'étude d'économies</span><span class="s">Les contrats de l'atelier passés au crible</span></span><span class="ar">→</span>
  </a>
  <div class="foot">Everywhere · Cabinet d'accompagnement numérique</div>
</div>
</body>
</html>
